name: Publish Docker Image

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image version from release tag
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: release
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-name-resolver:latest
            ${{ secrets.DOCKER_USERNAME }}/docker-name-resolver:${{ steps.meta.outputs.VERSION }}
          sbom: true
          provenance: mode=max

      - name: Record image in Docker Scout production (latest)
        uses: docker/scout-action@v1
        with:
          command: environment
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/docker-name-resolver:latest
          environment: production
          organization: ${{ secrets.DOCKER_USERNAME }}

      - name: Record image in Docker Scout production (release tag)
        uses: docker/scout-action@v1
        with:
          command: environment
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/docker-name-resolver:${{ steps.meta.outputs.VERSION }}
          environment: production
          organization: ${{ secrets.DOCKER_USERNAME }}

